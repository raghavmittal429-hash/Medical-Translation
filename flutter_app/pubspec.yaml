name: medical_cdss
description: AI-based Medical Report System
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.1
  flutter_tts: ^3.8.5
  fl_chart: ^0.69.0
  file_picker: ^8.1.6
  pdf: ^3.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# Patched local copy of flutter_tts 3.8.5: fixes a bug in the web (Chrome)
# implementation where switching to a language with no matching system
# voice left the engine permanently pinned to the previous voice — causing
# silent/garbled playback for translated text. See vendor/flutter_tts/lib
# /flutter_tts_web.dart for details. Safe to remove once upstream fixes
# https://github.com/dlutton/flutter_tts (no such fix exists yet as of
# package version 3.8.5).
dependency_overrides:
  flutter_tts:
    path: vendor/flutter_tts

flutter:
  uses-material-design: true

  assets:
    - assets/images/medisimple_logo.jpg
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf
    - assets/fonts/NotoSansDevanagari-Regular.ttf
    - assets/fonts/NotoSansDevanagari-Bold.ttf
    - assets/fonts/NotoSansTamil-Regular.ttf
    - assets/fonts/NotoSansBengali-Regular.ttf
    - assets/fonts/NotoSansArabic-Regular.ttf
